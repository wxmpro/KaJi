name: KaJi
options:
  bundleIdPrefix: com.kaji.app
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    PRODUCT_NAME: KaJi
    PRODUCT_BUNDLE_IDENTIFIER: com.kaji.app.KaJi
    MARKETING_VERSION: "1.11.3"
    CURRENT_PROJECT_VERSION: "55"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.1.0"
  # Sparkle 已不再依赖（v1.11.3 起）
  # 检查更新走自实现 URLSession 拉 appcast + 弹窗打开 GitHub release 下载页
  # 留 Sparkle 框架会让启动 dyld 加载崩溃（macOS 26 ad-hoc + hardened runtime 与
  # Sparkle universal framework 的隐式 Team ID 检查冲突，至今未解）

targets:
  KaJi:
    type: application
    platform: macOS
    sources:
      - path: KaJi
        excludes:
          - "UI.backup-*"
    dependencies:
      - package: GRDB
        product: GRDB
    info:
      path: KaJi/Info.plist
      properties:
        CFBundleName: KaJi
        CFBundleDisplayName: KaJi
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "© 2026 KaJi"
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.productivity
        NSHighResolutionCapable: true
        # === v1.11.3 起不依赖 Sparkle ===
        # 检查更新由 UpdaterService.swift 自实现：URLSession 拉 appcast + 比较 build 号 +
        # 弹窗打开 GitHub release 下载页（不再尝试自动装，避免 Sparkle 自动装签名问题）
        # 保留 SUFeedURL 仅作 fallback，将来如真接入 Apple Developer ID + 公证
        # 可无缝切回 Sparkle 全自动（更新 Info.plist key 即可）。
        SUFeedURL: "https://raw.githubusercontent.com/wxmpro/KaJi/main/appcast.xml"
    settings:
      base:
        INFOPLIST_FILE: KaJi/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
