name: KaJi
options:
  bundleIdPrefix: com.kaji.app
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    PRODUCT_NAME: KaJi
    PRODUCT_BUNDLE_IDENTIFIER: com.kaji.app.KaJi
    MARKETING_VERSION: "1.11.1"
    CURRENT_PROJECT_VERSION: "53"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.1.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  KaJi:
    type: application
    platform: macOS
    sources:
      - path: KaJi
        excludes:
          - "UI.backup-*"
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Sparkle
        product: Sparkle
    info:
      path: KaJi/Info.plist
      properties:
        CFBundleName: KaJi
        CFBundleDisplayName: KaJi
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "© 2026 KaJi"
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.productivity
        NSHighResolutionCapable: true
        # === Sparkle 2.x 在线更新 ===
        # ad-hoc 签名 + 递归签 framework + 一致签名身份 — Sparkle 自动安装成立
        # SUFeedURL：appcast.xml 部署位置（仓库根 /appcast.xml，不走 docs/ 因为 docs/ 在 .gitignore）
        # SUPublicEDKey：Ed25519 公钥 base64（44 字符），公钥公开可直接入库
        SUFeedURL: "https://raw.githubusercontent.com/wxmpro/KaJi/main/appcast.xml"
        SUEnableAutomaticChecks: true
        SUAllowsAutomaticUpdates: true
        SUScheduledCheckInterval: 86400
        SUPublicEDKey: "HSFWsbVvHwemdQzzqTYZNNuP9JqYtg3FXmczSfZqmn4="
    settings:
      base:
        INFOPLIST_FILE: KaJi/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
